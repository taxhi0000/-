<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>종합소득세 계산기</title>


  <style>
/*전체 폼 박스 (배치, 간격)*/
form {
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 400px;
  font-size: 1rem;       /* 글자 크기 */
  color: #333333;          /* 글자 색깔 */
  letter-spacing: 0.05em;  /* 글자 간격 */
}

/* 항목명 */
label {
  display: block;
  margin-bottom: 6px;
  font-weight: 600;
  font-size: 1rem;       /* 글자 크기 */
  color: #333333;          /* 글자 색깔 */
  letter-spacing: 0.05em;  /* 글자 간격 */
}

/*입력칸*/
input {
  text-align: right;
  display: block;
  width: 60%;
  height: 3rem;
  padding: 0 1rem;
  font-size: 3rem;
}
/*입력칸*/
    input {
  text-align: right;
  height: 3rem;
  padding: 0 5rem;
  font-size: 1rem;
}

/*계산하기*/
button {
  background-color: #1B4332;  /* 버튼 배경색 */
  color: white;                /* 글자색 */
  padding: 10px 20px;          /* 여백 (위아래 px, 좌우 px) */
  border: none;                /* 테두리 제거 */
  border-radius: 8px;          /* 모서리 둥글게 */
  cursor: pointer;             /* 마우스 올리면 손가락 모양 */
  font-size: 20px;             /* 글자 크기 */
}

  button:hover {
    background-color: #15372a;
  }


/*결과칸*/
td {
  padding: 12px 16px;
  font-size: 1.2rem;
}

td:last-child {
  text-align: right;
  padding-right: 15px;
}



</style>


</head>

<body>

  <h1>종합소득세 계산기</h1>

  <form>
    <label>종합소득금액</label>
    <input type="text" id="income" placeholder="예: 50,000,000" oninput="fmtInput(this)" />

    <label>소득공제</label>
    <input type="text" id="deduction" placeholder="예: 1,500,000" oninput="fmtInput(this)" />

    <button type="button" onclick="calculate()">계산하기</button>
  </form>

<div id="result" style="display:none; margin-top: 20px;">
  <table border="1">
    <tr><td>종합소득금액</td><td id="r-income"></td></tr>
    <tr><td>소득공제</td><td id="r-deduction"></td></tr>
    <tr><td>과세표준</td><td id="r-taxbase"></td></tr>

    <tr><td>소득세</td><td id="r-tax"></td></tr>
    <tr><td>지방세</td><td id="r-local"></td></tr>
    <tr><td><b>총 납부세액</b></td><td id="r-total"></td></tr>
  </table>
</div>

  <script>
  function fmtInput(el) {
    const raw = el.value.replace(/[^0-9]/g, '');
    el.value = raw ? parseInt(raw).toLocaleString('ko-KR') : '';
  }

function calculate() {
  const income = Number(document.getElementById('income').value.replace(/,/g, ''));
  const deductionRaw = Number(document.getElementById('deduction').value.replace(/,/g, ''));

  // [수정 1] 소득공제가 종합소득금액을 초과하면 종합소득금액으로 cap
  const deduction = Math.min(deductionRaw, income);
  const taxBase = income - deduction;

  let tax = 0;
  if (taxBase <= 14000000) {
    tax = taxBase * 0.06;
  } else if (taxBase <= 50000000) {
    tax = taxBase * 0.15 - 1260000;
  } else if (taxBase <= 88000000) {
    tax = taxBase * 0.24 - 5760000;
  } else if (taxBase <= 150000000) {
    tax = taxBase * 0.35 - 15440000;
  } else if (taxBase <= 300000000) {
    tax = taxBase * 0.38 - 19940000;
  } else if (taxBase <= 500000000) {
    tax = taxBase * 0.40 - 25940000;
  } else if (taxBase <= 1000000000) {
    tax = taxBase * 0.42 - 35940000;
  } else {
    tax = taxBase * 0.45 - 65940000;
  }

  // [수정 2] 소득세, 지방세 원단위 절사 (10원 단위 내림)
  tax = Math.floor(tax / 10) * 10;
  const localTax = Math.floor(tax * 0.1 / 10) * 10;
  const total = tax + localTax;

  // 쉼표 붙이는 함수
  function fmt(n) {
    return Math.round(n).toLocaleString('ko-KR') + '원';
  }

  // 결과 표에 넣기
  document.getElementById('r-income').textContent = fmt(income);
  document.getElementById('r-deduction').textContent = fmt(deduction);
  document.getElementById('r-taxbase').textContent = fmt(taxBase);
  document.getElementById('r-tax').textContent = fmt(tax);
  document.getElementById('r-local').textContent = fmt(localTax);
  document.getElementById('r-total').textContent = fmt(total);

  document.getElementById('result').style.display = 'block';
}

  </script>

</body>
</html>
