<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>종합소득세 계산기</title>
</head>
<body>

  <h1>종합소득세 계산기</h1>

  <!-- 입력 폼 -->
  <form>

    <label>종합소득금액</label>
    <input type="text" id="income" placeholder="예: 50,000,000" />

    <label>소득공제</label>
    <input type="text" id="deduction" placeholder="예: 1,500,000" />

    <button type="button" onclick="calculate()">계산하기</button>

  </form>

  <!-- 결과 -->
  <div id="result"></div>



<script>
  function calculate() {

    // 1. 입력값 읽기
    const income = document.getElementById('income').value;
    const deduction = document.getElementById('deduction').value;

    // 2. 계산
    const taxBase = income - deduction;  // 과세표준

    // 3. 결과 보여주기
    document.getElementById('result').textContent = '과세표준: ' + taxBase + '원';

  }
</script>



</body>
</html>
