<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>종합소득세 계산기</title>
</head>
<body>

  <h1>종합소득세 계산기</h1>

  <form>
    <label>종합소득금액</label>
    <input type="text" id="income" placeholder="예: 50,000,000" />

    <label>소득공제</label>
    <input type="text" id="deduction" placeholder="예: 1,500,000" />

    <button type="button" onclick="calculate()">계산하기</button>
  </form>

  <div id="result"></div>

  <script>
    function calculate() {

      // 1. 입력값 읽기
      const income = Number(document.getElementById('income').value);
      const deduction = Number(document.getElementById('deduction').value);

      // 2. 과세표준 계산
      const taxBase = income - deduction;

      // 3. 세율 적용
      let tax = 0;

      if (taxBase <= 14000000) {
        tax = taxBase * 0.06;
      } else if (taxBase <= 50000000) {
        tax = taxBase * 0.15 - 1260000;
      } else if (taxBase <= 88000000) {
        tax = taxBase * 0.24 - 5760000;
      } else if (taxBase <= 150000000) {
        tax = taxBase * 0.35 - 15440000;
      } else if (taxBase <= 300000000) {
        tax = taxBase * 0.38 - 19940000;
      } else if (taxBase <= 500000000) {
        tax = taxBase * 0.40 - 25940000;
      } else if (taxBase <= 1000000000) {
        tax = taxBase * 0.42 - 35940000;
      } else {
        tax = taxBase * 0.45 - 65940000;
      }

      // 4. 결과 보여주기
      document.getElementById('result').textContent = '산출세액: ' + tax + '원';

    }
  </script>

</body>
</html>
