<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>김호연 세금계산기</title>
  <meta property="og:title" content="김호연 세금계산기" />

  <style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background-color: #f4f6f4;
  color: #333;
  padding: 32px 20px;
}

nav {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 480px;
  margin-bottom: 28px;
}

.nav-btn {
  background: white;
  border: 1px solid #ddd;
  color: #333;
  padding: 14px 20px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 1rem;
  text-align: left;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nav-btn::after {
  content: '→';
  color: #aaa;
  font-size: 0.9rem;
}

.nav-btn.active {
  background-color: #1B4332;
  color: white;
  border-color: #1B4332;
}

.nav-btn.active::after {
  color: rgba(255,255,255,0.6);
}

.nav-btn:hover:not(.active) {
  background-color: #f0f0f0;
}

.calc-card {
  background: white;
  border-radius: 16px;
  border: 1px solid #e0e0e0;
  padding: 28px;
  max-width: 480px;
}

.calc-card h1 {
  font-size: 1.3rem;
  font-weight: 600;
  margin-bottom: 4px;
  color: #1B4332;
}

.calc-subtitle {
  font-size: 0.85rem;
  color: #888;
  margin-bottom: 24px;
}

form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

label {
  display: block;
  margin-bottom: 6px;
  font-weight: 600;
  font-size: 0.9rem;
  color: #555;
}

input {
  width: 100%;
  text-align: right;
  height: 3rem;
  padding: 0 16px;
  font-size: 1rem;
  border: 1px solid #ddd;
  border-radius: 10px;
  background: #f9f9f9;
  color: #333;
}

input:focus {
  outline: none;
  border-color: #1B4332;
  background: white;
}

input[type="date"] {
  text-align: left;
  padding: 0 12px;
}

button {
  background-color: #1B4332;
  color: white;
  padding: 14px 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 1rem;
  font-weight: 600;
  margin-top: 4px;
}

button:hover {
  background-color: #15372a;
}

small {
  color: #ff4444;
  font-size: 0.8rem;
  margin-top: -8px;
}

.result-section {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid #eee;
}

.result-label {
  font-size: 0.8rem;
  color: #999;
  margin-bottom: 12px;
}

.result-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 11px 14px;
  background: #f7f7f7;
  border-radius: 10px;
  font-size: 0.95rem;
}

.result-row span:first-child { color: #666; }
.result-row span:last-child { font-weight: 600; color: #333; }

.result-row.highlight { background: #e8f5ee; }
.result-row.highlight span { color: #1B4332 !important; }

.result-row.total { background: #1B4332; margin-top: 4px; }
.result-row.total span { color: white !important; font-weight: 600; }

  </style>
</head>

<body>

<nav>
  <button class="nav-btn" onclick="showPage('tax')">종합소득세 계산기</button>
  <button class="nav-btn" onclick="showPage('leave')">연차수당 계산기</button>
  <button class="nav-btn" onclick="showPage('retirement')">퇴직금 계산기</button>
</nav>

<!-- 종합소득세 계산기 -->
<div id="page-tax" style="display:none;">
  <div class="calc-card">
    <h1>종합소득세 계산기</h1>
    <p class="calc-subtitle">연 순이익 기준으로 계산합니다</p>
    <form>
      <div>
        <label>종합소득금액</label>
        <small>종합소득금액은 '연 순이익'을 입력하시면 됩니다.</small>
        <input type="text" id="income" placeholder="예: 50,000,000" oninput="fmtInput(this)" />
      </div>
      <div>
        <label>소득공제</label>
        <input type="text" id="deduction" placeholder="예: 1,500,000" oninput="fmtInput(this)" />
      </div>
      <button type="button" onclick="calculate()">계산하기</button>
    </form>
    <div id="result" style="display:none;">
      <div class="result-section">
        <p class="result-label">계산 결과</p>
        <div class="result-list">
          <div class="result-row"><span>종합소득금액</span><span id="r-income"></span></div>
          <div class="result-row"><span>소득공제</span><span id="r-deduction"></span></div>
          <div class="result-row"><span>과세표준</span><span id="r-taxbase"></span></div>
          <div class="result-row"><span>적용세율</span><span id="r-rate"></span></div>
          <div class="result-row highlight"><span>소득세</span><span id="r-tax"></span></div>
          <div class="result-row highlight"><span>지방세</span><span id="r-local"></span></div>
          <div class="result-row total"><span>총 납부세액</span><span id="r-total"></span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 연차수당 계산기 -->
<div id="page-leave" style="display:none;">
  <div class="calc-card">
    <h1>연차수당 계산기</h1>
    <p class="calc-subtitle">미사용 연차에 대한 수당을 계산합니다</p>
    <form>
      <div>
        <label>월 급여</label>
        <input type="text" id="salary" placeholder="예: 3,000,000" oninput="fmtInput(this)" />
      </div>
      <div>
        <label>주 근로일수</label>
        <input type="text" id="workdays" placeholder="예: 5" oninput="fmtUnit(this, '일')" />
      </div>
      <div>
        <label>일 근로시간</label>
        <input type="text" id="workhours" placeholder="예: 8" oninput="fmtUnit(this, '시간')" />
      </div>
      <div>
        <label>미사용 연차일수</label>
        <input type="text" id="unusedleave" placeholder="예: 2" oninput="fmtUnit(this, '일')" />
      </div>
      <button type="button" onclick="calculateLeave()">계산하기</button>
    </form>
    <div id="result-leave" style="display:none;">
      <div class="result-section">
        <p class="result-label">계산 결과</p>
        <div class="result-list">
          <div class="result-row"><span>월 급여</span><span id="l-salary"></span></div>
          <div class="result-row"><span>월 소정근로시간</span><span id="l-monthly-hours"></span></div>
          <div class="result-row"><span>시간당 통상임금</span><span id="l-hourly"></span></div>
          <div class="result-row"><span>1일 통상임금</span><span id="l-daily"></span></div>
          <div class="result-row"><span>미사용 연차일수</span><span id="l-unused"></span></div>
          <div class="result-row total"><span>연차수당 총액</span><span id="l-total"></span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 퇴직금 계산기 -->
<div id="page-retirement" style="display:none;">
  <div class="calc-card">
    <h1>퇴직금 계산기</h1>
    <p class="calc-subtitle">퇴직금 및 실수령액을 계산합니다</p>
    <form>
      <div>
        <label>입사일</label>
        <input type="date" id="join-date" onchange="onDateChange()" />
      </div>
      <div>
        <label>퇴사일</label>
        <input type="date" id="leave-date" onchange="onDateChange()" />
      </div>
      <div id="salary-section" style="display:none;">
        <div id="salary-inputs"></div>
      </div>
      <button type="button" onclick="calculateRetirement()">계산하기</button>
    </form>
    <div id="result-retirement" style="display:none;">
      <div class="result-section">
        <p class="result-label">계산 결과</p>
        <div class="result-list">
          <div class="result-row"><span>근속기간</span><span id="ret-period"></span></div>
          <div class="result-row"><span>근속일수</span><span id="ret-days"></span></div>
          <div class="result-row"><span>평균임금 (일)</span><span id="ret-avg"></span></div>
          <div class="result-row highlight"><span>퇴직금</span><span id="ret-pay"></span></div>
          <div class="result-row"><span>퇴직소득세</span><span id="ret-tax"></span></div>
          <div class="result-row"><span>퇴직지방세</span><span id="ret-local"></span></div>
          <div class="result-row total"><span>실수령액</span><span id="ret-total"></span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function onDateChange() {
  const joinDate = document.getElementById('join-date').value;
  const leaveDate = document.getElementById('leave-date').value;
  if (!joinDate || !leaveDate) return;

  const leave = new Date(leaveDate);
  const lastDay = new Date(leave.getFullYear(), leave.getMonth() + 1, 0).getDate();
  const isLastDay = leave.getDate() === lastDay;
  const months = isLastDay ? 3 : 4;

  const section = document.getElementById('salary-section');
  const container = document.getElementById('salary-inputs');
  section.style.display = 'block';

  let html = `<p style="color:${isLastDay ? '#888' : 'red'}; font-size:0.85rem; margin-bottom:8px;">
    ${isLastDay ? '말일 퇴사: 최근 3개월 급여 입력' : '월중 퇴사: 최근 4개월 급여 입력 (그냥 해당 월에 받은 전체급여 입력)'}
  </p>`;

  for (let i = months - 1; i >= 0; i--) {
    const d = new Date(leave.getFullYear(), leave.getMonth() - i, 1);
    const y = d.getFullYear();
    const m = d.getMonth() + 1;
    const monthEnd = new Date(y, m, 0).getDate();
    let workDays;
    if (i === 0 && !isLastDay) {
      workDays = leave.getDate();
    } else if (i === months - 1 && !isLastDay) {
      workDays = monthEnd - leave.getDate();
    } else {
      workDays = monthEnd;
    }

    html += `
      <div style="margin-bottom:12px;">
        <label>${y}년 ${m}월 급여 <span style="color:#888; font-size:0.8rem;">(근무일수: ${workDays}일)</span></label>
        <input type="text" id="sal-${y}-${m}" data-days="${workDays}" data-month="${y}-${m}" placeholder="예: 2,200,000" oninput="fmtInput(this)" />
      </div>`;
  }

  container.innerHTML = html;
}

function calculateRetirement() {
  const joinDate = new Date(document.getElementById('join-date').value);
  const leaveDate = new Date(document.getElementById('leave-date').value);

  if (!joinDate || !leaveDate || isNaN(joinDate) || isNaN(leaveDate)) {
    alert('입사일과 퇴사일을 입력해주세요.');
    return;
  }

  const diffMs = leaveDate - joinDate;
  const totalDays = Math.floor(diffMs / (1000 * 60 * 60 * 24)) + 1;

  let years = leaveDate.getFullYear() - joinDate.getFullYear();
  let months = leaveDate.getMonth() - joinDate.getMonth();
  let days = leaveDate.getDate() - joinDate.getDate();
  if (days < 0) { months--; days += new Date(leaveDate.getFullYear(), leaveDate.getMonth(), 0).getDate(); }
  if (months < 0) { years--; months += 12; }
  const periodStr = `${years}년 ${months}개월 ${days}일`;

  const serviceYears = Math.ceil(totalDays / 365);

  const inputs = document.querySelectorAll('[data-month]');
  let totalSalary = 0;
  inputs.forEach(input => {
    const val = Number(input.value.replace(/,/g, '')) || 0;
    const workDays = Number(input.dataset.days);
    const monthStr = input.dataset.month;
    const parts = monthStr.split('-');
    const monthEnd = new Date(parts[0], parts[1], 0).getDate();
    totalSalary += val / monthEnd * workDays;
  });
  const dailyAvg = totalSalary / 90;

  const retirementPay = dailyAvg * 30 * (totalDays / 365);
  const tax = calcRetirementTax(retirementPay, serviceYears);
  const localTax = Math.floor(tax * 0.1 / 10) * 10;
  const netPay = retirementPay - tax - localTax;

  document.getElementById('ret-period').textContent = periodStr;
  document.getElementById('ret-days').textContent = totalDays + '일';
  document.getElementById('ret-avg').textContent = fmt(dailyAvg);
  document.getElementById('ret-pay').textContent = fmt(retirementPay);
  document.getElementById('ret-tax').textContent = fmt(tax);
  document.getElementById('ret-local').textContent = fmt(localTax);
  document.getElementById('ret-total').textContent = fmt(netPay);

  document.getElementById('result-retirement').style.display = 'block';
}

function fmtUnit(el, unit) {
  const raw = el.value.replace(/[^0-9]/g, '');
  el.value = raw ? raw + unit : '';
}

function calcRetirementTax(retirementPay, serviceYears) {
  let deduction = 0;
  if (serviceYears <= 5) deduction = serviceYears * 1000000;
  else if (serviceYears <= 10) deduction = 5000000 + (serviceYears - 5) * 2000000;
  else if (serviceYears <= 20) deduction = 15000000 + (serviceYears - 10) * 2500000;
  else deduction = 40000000 + (serviceYears - 20) * 3000000;

  const retirementIncome = Math.max(retirementPay - deduction, 0);
  const annualIncome = retirementIncome / serviceYears * 12;

  let incomeDeduction = 0;
  if (annualIncome <= 8000000) incomeDeduction = annualIncome;
  else if (annualIncome <= 70000000) incomeDeduction = 8000000 + (annualIncome - 8000000) * 0.6;
  else if (annualIncome <= 100000000) incomeDeduction = 45200000 + (annualIncome - 70000000) * 0.55;
  else if (annualIncome <= 300000000) incomeDeduction = 61700000 + (annualIncome - 100000000) * 0.45;
  else incomeDeduction = 151700000 + (annualIncome - 300000000) * 0.35;

  const taxBase = annualIncome - incomeDeduction;

  let annualTax = 0;
  if (taxBase <= 14000000) annualTax = taxBase * 0.06;
  else if (taxBase <= 50000000) annualTax = taxBase * 0.15 - 1260000;
  else if (taxBase <= 88000000) annualTax = taxBase * 0.24 - 5760000;
  else if (taxBase <= 150000000) annualTax = taxBase * 0.35 - 15440000;
  else if (taxBase <= 300000000) annualTax = taxBase * 0.38 - 19940000;
  else if (taxBase <= 500000000) annualTax = taxBase * 0.40 - 25940000;
  else if (taxBase <= 1000000000) annualTax = taxBase * 0.42 - 35940000;
  else annualTax = taxBase * 0.45 - 65940000;

  const retirementTax = Math.floor((annualTax / 12 * serviceYears) / 10) * 10;
  return Math.max(retirementTax, 0);
}

function fmtInput(el) {
  const raw = el.value.replace(/[^0-9]/g, '');
  el.value = raw ? parseInt(raw).toLocaleString('ko-KR') : '';
}

function fmt(n) {
  return Math.round(n).toLocaleString('ko-KR') + '원';
}

function calculate() {
  const income = Number(document.getElementById('income').value.replace(/,/g, ''));
  const deductionRaw = Number(document.getElementById('deduction').value.replace(/,/g, ''));
  const deduction = Math.min(deductionRaw, income);
  const taxBase = income - deduction;

  let tax = 0;
  let rate = 0;
  if (taxBase <= 14000000) {
    rate = 6; tax = taxBase * 0.06;
  } else if (taxBase <= 50000000) {
    rate = 15; tax = taxBase * 0.15 - 1260000;
  } else if (taxBase <= 88000000) {
    rate = 24; tax = taxBase * 0.24 - 5760000;
  } else if (taxBase <= 150000000) {
    rate = 35; tax = taxBase * 0.35 - 15440000;
  } else if (taxBase <= 300000000) {
    rate = 38; tax = taxBase * 0.38 - 19940000;
  } else if (taxBase <= 500000000) {
    rate = 40; tax = taxBase * 0.40 - 25940000;
  } else if (taxBase <= 1000000000) {
    rate = 42; tax = taxBase * 0.42 - 35940000;
  } else {
    rate = 45; tax = taxBase * 0.45 - 65940000;
  }

  tax = Math.floor(tax / 10) * 10;
  const localTax = Math.floor(tax * 0.1 / 10) * 10;
  const total = tax + localTax;

  document.getElementById('r-income').textContent = fmt(income);
  document.getElementById('r-deduction').textContent = fmt(deduction);
  document.getElementById('r-taxbase').textContent = fmt(taxBase);
  document.getElementById('r-rate').textContent = rate + '%';
  document.getElementById('r-tax').textContent = fmt(tax);
  document.getElementById('r-local').textContent = fmt(localTax);
  document.getElementById('r-total').textContent = fmt(total);

  document.getElementById('result').style.display = 'block';
}

function calculateLeave() {
  const salary = Number(document.getElementById('salary').value.replace(/,/g, ''));
  const workdays = Number(document.getElementById('workdays').value.replace(/[^0-9]/g, ''));
  const workhours = Number(document.getElementById('workhours').value.replace(/[^0-9]/g, ''));
  const unused = Number(document.getElementById('unusedleave').value.replace(/[^0-9]/g, ''));

  const weeklyHours = workdays * workhours;
  const weeklyPaidHours = weeklyHours + 8;
  const monthlyHours = weeklyPaidHours * (365 / 7) / 12;
  const hourlyWage = salary / monthlyHours;
  const dailyWage = hourlyWage * workhours;
  const total = dailyWage * unused;

  document.getElementById('l-salary').textContent = fmt(salary);
  document.getElementById('l-monthly-hours').textContent = Math.round(monthlyHours) + '시간';
  document.getElementById('l-hourly').textContent = fmt(hourlyWage);
  document.getElementById('l-daily').textContent = fmt(dailyWage);
  document.getElementById('l-unused').textContent = unused + '일';
  document.getElementById('l-total').textContent = fmt(total);

  document.getElementById('result-leave').style.display = 'block';
}

function showPage(page) {
  document.getElementById('page-tax').style.display = page === 'tax' ? 'block' : 'none';
  document.getElementById('page-leave').style.display = page === 'leave' ? 'block' : 'none';
  document.getElementById('page-retirement').style.display = page === 'retirement' ? 'block' : 'none';
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active',
      (page === 'tax' && i === 0) ||
      (page === 'leave' && i === 1) ||
      (page === 'retirement' && i === 2)
    );
  });
}
</script>

</body>
</html>
